name: Deploy IDEALORO-PREVIEW
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-idealoro-preview
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          BASE="/home/forge/preview.florenceegi.com"
          DEPLOY_SCRIPT="cd $BASE && git pull origin main && npm install --production && npm run build && pm2 restart idealoro-preview || pm2 start dist/server/entry.mjs --name idealoro-preview -- --host 0.0.0.0 --port 4100"

          export DEPLOY_SCRIPT

          COMMAND_ID=$(python3 -c "import json,subprocess,os,sys; s=os.environ['DEPLOY_SCRIPT']; i=os.environ['EC2_INSTANCE_ID']; payload=json.dumps({'InstanceIds':[i],'DocumentName':'AWS-RunShellScript','TimeoutSeconds':600,'Parameters':{'commands':['sudo -u forge bash -c '+repr(s)]}}); r=subprocess.run(['aws','ssm','send-command','--cli-input-json',payload,'--query','Command.CommandId','--output','text'],capture_output=True,text=True); print(r.stderr,file=sys.stderr) if r.returncode!=0 else None; sys.exit(r.returncode) if r.returncode!=0 else print(r.stdout.strip())")

          echo "SSM Command: $COMMAND_ID"

          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "InProgress")

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy OK"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "FAILED: $STATUS"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1
